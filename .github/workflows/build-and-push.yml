name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v2.1.3, etc.

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Add concurrency to cancel previous builds
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "Wolfremium.Estimados.Api/Dockerfile"
          failure-threshold: "error"

      - name: Lowercase image name
        id: string
        run: |
          IMAGE_NAME_LC=$(echo "${{ github.repository }}-api" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME_LC" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: |
          # Remove 'v' prefix from tag to get clean version
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
          buildkitd-flags: --allow-insecure-entitlement network.host

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up old cache entries
        run: |
          # Clean up old cache entries to prevent cache pollution
          echo "Cleaning up cache entries older than 7 days..."
          # This helps prevent cache bloat and ensures fresh builds when needed

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.string.outputs.image_name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Wolfremium Estimados Api
            org.opencontainers.image.description=The estimation API backend for es-timados
            org.opencontainers.image.vendor=Wolfremium
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            maintainer=Wolfremium
            version=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Wolfremium.Estimados.Api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=buildkit-api
            type=registry,ref=${{ env.REGISTRY }}/${{ steps.string.outputs.image_name }}:latest
          cache-to: |
            type=gha,mode=max,scope=buildkit-api
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          provenance: false
          sbom: false

      - name: Generate build summary
        run: |
          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ steps.string.outputs.image_name }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Available Tags:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Create release notes
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const imageUrl = '${{ env.REGISTRY }}/${{ steps.string.outputs.image_name }}:' + version;

            const releaseNotes = `
            ## 🐳 Docker Image

            **Pull command:**
            \`\`\`bash
            docker pull ${imageUrl}
            \`\`\`

            **Run command:**
            \`\`\`bash
            docker run -p 5011:8080 ${imageUrl}
            \`\`\`

            ## 📋 Image Details
            - **Registry:** ${{ env.REGISTRY }}
            - **Repository:** ${{ steps.string.outputs.image_name }}
            - **Version:** ${version}
            - **Platforms:** linux/amd64
            - **Base Image:** mcr.microsoft.com/dotnet/aspnet:10.0

            ## 🔗 Links
            - [Package on GitHub](https://github.com/${{ github.repository }}/pkgs/container/estimados-backend-api)
            - [Dockerfile](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/Wolfremium.Estimados.Api/Dockerfile)
            `;

            console.log('Release notes created for version:', version);
