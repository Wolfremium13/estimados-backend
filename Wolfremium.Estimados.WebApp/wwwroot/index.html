<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Wolfremium.Estimados.WebApp</title>
    <base href="/"/>
    <link id="webassembly" rel="preload"/>
    <link href="lib/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="css/app.css" rel="stylesheet"/>
    <link href="favicon.png" rel="icon" type="image/png"/>
    <link href="Wolfremium.Estimados.WebApp.styles.css" rel="stylesheet"/>
    <script type="importmap"></script>
</head>

<body>
<div id="app">
    <svg class="loading-progress">
        <circle cx="50%" cy="50%" r="40%"/>
        <circle cx="50%" cy="50%" r="40%"/>
    </svg>
    <div class="loading-progress-text"></div>
</div>

<div id="blazor-error-ui">
    <span class="error-badge" id="error-badge-container">
        <span class="error-icon">⚠️</span>
        <span id="error-text-display">An unexpected error has occurred.</span>
        <span class="error-tooltip" id="error-tooltip-content">Something went wrong. Please reload the session.</span>
    </span>
    <a class="reload" href=".">Reload</a>
    <span class="dismiss">🗙</span>
</div>
<script>
    function handleError(message, stack) {
        var errorTextDisplay = document.getElementById('error-text-display');
        var errorTooltipContent = document.getElementById('error-tooltip-content');
        if (errorTextDisplay && errorTooltipContent) {
            var isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (isDev) {
                errorTextDisplay.innerText = "Developer Error (Hover for details)";
                errorTooltipContent.innerText = (message || "Unknown error") + (stack ? "\n\nStack Trace:\n" + stack : "");
            } else {
                errorTextDisplay.innerText = "An unexpected error occurred.";
                errorTooltipContent.innerText = "Something went wrong. Please reload the session or contact support.";
            }
        }
    }

    window.onerror = function (message, source, lineno, colno, error) {
        var stack = error ? error.stack : "";
        handleError(message, stack);
    };

    window.addEventListener('unhandledrejection', function (event) {
        var message = event.reason ? event.reason.message || event.reason.toString() : "Unhandled promise rejection";
        var stack = event.reason ? event.reason.stack : "";
        handleError(message, stack);
    });
</script>
<script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
